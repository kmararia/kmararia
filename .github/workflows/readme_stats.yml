name: Update README stats cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: stats/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[kev-bot]"
          git config user.email "github-actions[kev-bot]@users.noreply.github.com"
          git checkout -B refresh-profile
          git add stats/*.svg
          git commit -m "bot(readme): update README stats cards" || exit 0
          git push origin refresh-profile --force
