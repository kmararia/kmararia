name: Set up 3D commit profile

on:
  schedule:
    # Run at 0 am every day
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: svg-store

      - name: Generate 3D contribution profile
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PROFILE_PAT }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: conf/3d-profile-configs.json

      - name: Move files
        run: |
          mkdir -p ./utils
          for f in ./profile-3d-contrib/*; do mv "$f" "./utils/commits-$(basename "$f")"; done
          rm -rf ./profile-3d-contrib

      - name: Download github-contrib-stats
        run: |
          curl -sSL --output /tmp/github-contrib-stats.tar.gz https://github.com/j178/github-contrib-stats/releases/latest/download/github-contrib-stats-x86_64-unknown-linux-gnu.tar.gz && \
          tar -xvf /tmp/github-contrib-stats.tar.gz -C /tmp && \
          chmod +x /tmp/github-contrib-stats

      - name: Set up contribution.md file
        run: |
          cat > contribution.md <<EOL
          <!-- BEGIN:created_repos -->
          <!-- END:created_repos -->
          <!-- BEGIN:contributions -->
          <!-- END:contributions -->
          <!-- BEGIN:contributed -->
          <!-- END:contributed -->
          EOL

      - name: Update contribution stats
        run: /tmp/github-contrib-stats -u ${{ github.repository_owner }} --update contribution.md
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PROFILE_PAT }}

      - name: Push utilities to output branch
        run: |
          git config user.name 'github-actions[kev-bot]'
          git config user.email 'github-actions[kev-bot]@users.noreply.github.com'
          git add utils/ contribution.md
          git commit -m "bot(build-svgs): refresh 3D commit profile" --allow-empty || echo "No changes"
          git push origin svg-store --force
